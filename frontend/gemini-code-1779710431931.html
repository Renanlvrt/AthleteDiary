<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athlete Diary - Iconic UI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    background: #e0e0e0;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  
  .phone {
    width: 340px;
    height: 720px;
    background: #FFE500;
    border-radius: 40px;
    border: 4px solid #111;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 32px 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  }

  .header-lbl {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #000;
    margin-bottom: 24px;
    margin-top: 10px;
  }

  .hero-title {
    font-size: 56px;
    font-weight: 900;
    color: #000;
    text-transform: uppercase;
    line-height: 0.9;
    letter-spacing: -2px;
    margin-bottom: 24px;
  }

  .sub-text {
    font-size: 14px;
    font-weight: 600;
    color: #000;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  /* ICON GRID */
  .icon-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding: 0 4px;
  }

  .icon-box {
    width: 52px;
    height: 52px;
    background: #000;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
  }
  
  /* Give them a slight playful rotation like your screenshot */
  .icon-box:nth-child(1) { transform: rotate(-4deg); }
  .icon-box:nth-child(2) { transform: rotate(2deg); }
  .icon-box:nth-child(3) { transform: rotate(-2deg); }
  .icon-box:nth-child(4) { transform: rotate(5deg); }
  .icon-box:nth-child(5) { transform: rotate(-3deg); }
  
  .icon-box:hover {
    transform: scale(1.1) rotate(0deg);
  }

  /* SVG Styling */
  .icon-box svg {
    width: 26px;
    height: 26px;
    stroke: #FFE500;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  /* CTA BUTTON */
  .btn {
    background: #000;
    border-radius: 100px;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    margin-bottom: 12px;
  }

  .btn span {
    font-size: 14px;
    font-weight: 900;
    color: #FFE500;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  
  .btn svg {
    width: 18px;
    height: 18px;
    stroke: #FFE500;
    stroke-width: 3;
    fill: none;
  }

  .btn-sub {
    text-align: center;
    font-size: 10px;
    color: #000;
    opacity: 0.5;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <div class="phone">
    <div class="header-lbl">Athlete Diary</div>
    
    <div class="hero-title">
      Your<br>
      Training<br>
      Diary.
    </div>
    
    <div class="sub-text">
      Log every session.<br>
      Track your mood.<br>
      See how you grow over time.
    </div>

    <div class="icon-row">
      <div class="icon-box">
        <svg viewBox="0 0 24 24">
          <path d="M13 4a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
          <path d="M10 10l-1.5 3 2.5 3"/>
          <path d="M14 16l-3-4-2-2-2 1"/>
          <path d="M16 10l-2-2-2 1"/>
          <path d="M13 22l-2-4-1-2"/>
        </svg>
      </div>

      <div class="icon-box">
        <svg viewBox="0 0 24 24">
          <path d="M6 4v16"/>
          <path d="M18 4v16"/>
          <path d="M2 8h4v8H2z"/>
          <path d="M18 8h4v8h-4z"/>
          <path d="M6 12h12"/>
        </svg>
      </div>

      <div class="icon-box">
        <svg viewBox="0 0 24 24">
          <circle cx="5.5" cy="17.5" r="3.5"/>
          <circle cx="18.5" cy="17.5" r="3.5"/>
          <path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/>
          <path d="M12 17.5l2-3.5"/>
        </svg>
      </div>

      <div class="icon-box">
        <svg viewBox="0 0 24 24">
          <path d="M2 16c1.2 0 2.4-1 3.5-1s2.3 1 3.5 1 2.4-1 3.5-1 2.3 1 3.5 1 2.4-1 3.5-1 2.3 1 3.5 1"/>
          <path d="M2 20c1.2 0 2.4-1 3.5-1s2.3 1 3.5 1 2.4-1 3.5-1 2.3 1 3.5 1 2.4-1 3.5-1 2.3 1 3.5 1"/>
          <circle cx="12" cy="6" r="2.5"/>
          <path d="M15 11l-3-2-4 2"/>
        </svg>
      </div>

      <div class="icon-box">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <path d="m12 7-4 3 1.5 5h5.5l1.5-5z"/>
          <path d="M12 7V2"/>
          <path d="m8 10-5.5-2"/>
          <path d="m16 10 5.5-2"/>
          <path d="m9.5 15-4.5 4.5"/>
          <path d="m14.5 15 4.5 4.5"/>
        </svg>
      </div>
    </div>

    <div class="btn">
      <span>Get Started</span>
      <svg viewBox="0 0 24 24" stroke-linecap="square" stroke-linejoin="miter">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </div>
    <div class="btn-sub">Takes about 45 seconds</div>

  </div>

</body>
</html>
